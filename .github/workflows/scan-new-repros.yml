# Internal workflow
# Force refresh for GitHub Actions cache
name: "[Internal] Scan for New Reproductions"

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Pruva API URL'
        required: false
        default: 'https://api.pruva.dev/v1'
      run_tests:
        description: 'Run Codespace tests after creating branches'
        required: false
        default: 'true'
        type: boolean
      test_count:
        description: 'Number of latest branches to test'
        required: false
        default: '10'

jobs:
  scan-and-create-branches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      created: ${{ steps.scan.outputs.created }}
      fixed: ${{ steps.scan.outputs.fixed }}
      new_repro_ids: ${{ steps.scan.outputs.new_repro_ids }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all reproductions and create branches
        id: scan
        env:
          API_URL: ${{ inputs.api_url }}
          DEFAULT_SANDBOX_IMAGE: ghcr.io/n3mes1s/pruva-sandbox@sha256:1aca6eb86791c66bb964b421dad5de27d5482953916280ee400fba160f87f374
        run: |
          echo "Fetching reproductions from $API_URL..."
          echo "Default sandbox image: $DEFAULT_SANDBOX_IMAGE"
          REPRO_CACHE_DIR="/workspaces/pruva-sandbox/.pruva-repro-cache"
          DOCKER_API_VERSION="1.43"

          # Fetch all reproductions (paginated)
          REPROS=$(curl -sf "$API_URL/reproductions?status=published&limit=1000" | jq -r '.reproductions[].repro_id')

          if [ -z "$REPROS" ]; then
            echo "No reproductions found or API error"
            exit 1
          fi

          echo "Found reproductions:"
          echo "$REPROS"
          echo ""

          CREATED=0
          FIXED=0
          SKIPPED=0
          NEW_IDS=""

          for REPRO_ID in $REPROS; do
            BRANCH="repro/$REPRO_ID"
            REPRO_JSON=$(curl -sf "$API_URL/reproductions/$REPRO_ID" || echo "{}")
            EXPECTED_IMAGE=$(echo "$REPRO_JSON" | jq -r --arg default_image "$DEFAULT_SANDBOX_IMAGE" '.environment.sandbox_image // $default_image')

            # Check if branch exists and if it's properly configured
            if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
              # Branch exists - check if REPRO_ID and sandbox image are set correctly
              CURRENT_DEVCONTAINER=$(curl -sf "https://raw.githubusercontent.com/N3mes1s/pruva-sandbox/$BRANCH/.devcontainer/devcontainer.json" || echo "{}")
              CURRENT_ID=$(echo "$CURRENT_DEVCONTAINER" | jq -r '.containerEnv.REPRO_ID // empty')
              CURRENT_API_URL=$(echo "$CURRENT_DEVCONTAINER" | jq -r '.containerEnv.PRUVA_API_URL // empty')
              CURRENT_IMAGE=$(echo "$CURRENT_DEVCONTAINER" | jq -r '.image // empty')
              CURRENT_ENV_IMAGE=$(echo "$CURRENT_DEVCONTAINER" | jq -r '.containerEnv.PRUVA_SANDBOX_IMAGE // empty')
              CURRENT_REPRO_CACHE_DIR=$(echo "$CURRENT_DEVCONTAINER" | jq -r '.containerEnv.PRUVA_REPRO_CACHE_DIR // empty')
              CURRENT_DOCKER_API_VERSION=$(echo "$CURRENT_DEVCONTAINER" | jq -r '.containerEnv.DOCKER_API_VERSION // empty')
              CURRENT_SSHD_VERSION=$(echo "$CURRENT_DEVCONTAINER" | jq -r '.features["ghcr.io/devcontainers/features/sshd:1"].version // empty')
              CURRENT_DOCKER_MOBY=$(echo "$CURRENT_DEVCONTAINER" | jq -r 'if .features["ghcr.io/devcontainers/features/docker-outside-of-docker:1"].moby == false then "false" elif .features["ghcr.io/devcontainers/features/docker-outside-of-docker:1"].moby == true then "true" else "unset" end')
              CURRENT_DOCKER_COMPOSE_MODE=$(echo "$CURRENT_DEVCONTAINER" | jq -r '.features["ghcr.io/devcontainers/features/docker-outside-of-docker:1"].dockerDashComposeVersion // empty')

              if [ "$CURRENT_ID" = "$REPRO_ID" ] && [ "$CURRENT_API_URL" = "$API_URL" ] && [ "$CURRENT_SSHD_VERSION" = "latest" ] && [ "$CURRENT_DOCKER_MOBY" = "false" ] && [ "$CURRENT_DOCKER_COMPOSE_MODE" = "none" ] && [ "$CURRENT_IMAGE" = "$EXPECTED_IMAGE" ] && [ "$CURRENT_ENV_IMAGE" = "$EXPECTED_IMAGE" ] && [ "$CURRENT_REPRO_CACHE_DIR" = "$REPRO_CACHE_DIR" ] && [ "$CURRENT_DOCKER_API_VERSION" = "$DOCKER_API_VERSION" ]; then
                echo "SKIP: $BRANCH already configured correctly"
                SKIPPED=$((SKIPPED + 1))
                continue
              fi

              echo "FIX: $BRANCH (current id: ${CURRENT_ID:-empty}, expected id: $REPRO_ID, current api: ${CURRENT_API_URL:-empty}, expected api: $API_URL, current image: ${CURRENT_IMAGE:-empty}, current env image: ${CURRENT_ENV_IMAGE:-empty}, expected image: ${EXPECTED_IMAGE:-none}, cache: ${CURRENT_REPRO_CACHE_DIR:-missing}, docker api: ${CURRENT_DOCKER_API_VERSION:-missing}, sshd: ${CURRENT_SSHD_VERSION:-missing}, docker moby: ${CURRENT_DOCKER_MOBY:-unset}, docker compose mode: ${CURRENT_DOCKER_COMPOSE_MODE:-unset})"

              # Checkout existing branch and fix it
              git fetch origin "$BRANCH:$BRANCH"
              git checkout "$BRANCH"

              # Update devcontainer.json to set correct REPRO_ID and pinned image.
              # Prefer the image that the worker recorded; fall back to the production default
              # so older API records do not keep Codespaces on :latest.
              tmp_devcontainer=$(mktemp)
              jq --arg repro_id "$REPRO_ID" --arg api_url "$API_URL" --arg image "$EXPECTED_IMAGE" --arg cache_dir "$REPRO_CACHE_DIR" --arg docker_api "$DOCKER_API_VERSION" \
                '.features //= {} | .features["ghcr.io/devcontainers/features/docker-outside-of-docker:1"].moby = false | .features["ghcr.io/devcontainers/features/docker-outside-of-docker:1"].dockerDashComposeVersion = "none" | .features["ghcr.io/devcontainers/features/sshd:1"].version = "latest" | .containerEnv.REPRO_ID = $repro_id | .containerEnv.PRUVA_API_URL = $api_url | .containerEnv.PRUVA_SANDBOX_IMAGE = $image | .containerEnv.PRUVA_REPRO_CACHE_DIR = $cache_dir | .containerEnv.DOCKER_API_VERSION = $docker_api | .image = $image' \
                .devcontainer/devcontainer.json > "$tmp_devcontainer"
              mv "$tmp_devcontainer" .devcontainer/devcontainer.json

              # Commit and force-push fix
              git add .devcontainer/devcontainer.json
              git commit -m "fix: configure Codespace for $REPRO_ID" \
                -m "Co-Authored-By: GitHub Actions <github-actions[bot]@users.noreply.github.com>"
              git push --force-with-lease origin "$BRANCH"

              FIXED=$((FIXED + 1))
              NEW_IDS="$NEW_IDS $REPRO_ID"

              # Return to main
              git checkout main
              continue
            fi

            echo "CREATE: $BRANCH"

            # Create branch from main
            git checkout -b "$BRANCH" origin/main

            # Update devcontainer.json to set REPRO_ID and pinned image.
            tmp_devcontainer=$(mktemp)
            jq --arg repro_id "$REPRO_ID" --arg api_url "$API_URL" --arg image "$EXPECTED_IMAGE" --arg cache_dir "$REPRO_CACHE_DIR" --arg docker_api "$DOCKER_API_VERSION" \
              '.features //= {} | .features["ghcr.io/devcontainers/features/docker-outside-of-docker:1"].moby = false | .features["ghcr.io/devcontainers/features/docker-outside-of-docker:1"].dockerDashComposeVersion = "none" | .features["ghcr.io/devcontainers/features/sshd:1"].version = "latest" | .containerEnv.REPRO_ID = $repro_id | .containerEnv.PRUVA_API_URL = $api_url | .containerEnv.PRUVA_SANDBOX_IMAGE = $image | .containerEnv.PRUVA_REPRO_CACHE_DIR = $cache_dir | .containerEnv.DOCKER_API_VERSION = $docker_api | .image = $image' \
              .devcontainer/devcontainer.json > "$tmp_devcontainer"
            mv "$tmp_devcontainer" .devcontainer/devcontainer.json

            # Commit changes
            git add .devcontainer/devcontainer.json
            git commit -m "chore: configure Codespace for $REPRO_ID" \
              -m "Co-Authored-By: GitHub Actions <github-actions[bot]@users.noreply.github.com>"

            # Push branch
            git push origin "$BRANCH"

            CREATED=$((CREATED + 1))
            NEW_IDS="$NEW_IDS $REPRO_ID"

            # Return to main for next iteration
            git checkout main
          done

          echo ""
          echo "=========================================="
          echo "Summary:"
          echo "  Created: $CREATED"
          echo "  Fixed: $FIXED"
          echo "  Skipped: $SKIPPED"
          echo "=========================================="

          if [ $CREATED -eq 0 ] && [ $FIXED -eq 0 ]; then
            echo "No changes needed - all branches are correctly configured"
          fi

          echo "created=$CREATED" >> "$GITHUB_OUTPUT"
          echo "fixed=$FIXED" >> "$GITHUB_OUTPUT"
          echo "new_repro_ids=$(echo $NEW_IDS | xargs)" >> "$GITHUB_OUTPUT"

  # Run Codespace tests on the latest branches after scanning
  test-codespaces:
    needs: scan-and-create-branches
    if: ${{ inputs.run_tests }}
    uses: ./.github/workflows/test-codespaces.yml
    with:
      api_url: ${{ inputs.api_url }}
      latest_count: ${{ inputs.test_count || '10' }}
    permissions:
      contents: read
      packages: read
      issues: write
